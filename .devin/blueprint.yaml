# https://docs.devin.ai/onboard-devin/environment-yaml
# Devin environment for DendriteTrader.jl

initialize: |
  mkdir -p ~/.julia
  if [ ! -d ~/.julia/julia-1.10.11 ]; then
    url="https://julialang-s3.julialang.org/bin/linux/x64/1.10/julia-1.10.11-linux-x86_64.tar.gz"
    curl -fsSL -o /tmp/julia.tar.gz "$url"
    echo "fb49c6b174600cd2051e37ba3f7330f8acf06dd00bce609bab6611387fdb37bf  /tmp/julia.tar.gz" | sha256sum --strict --check -
    tar -xzf /tmp/julia.tar.gz -C ~/.julia
  fi
  echo "PATH=$HOME/.julia/julia-1.10.11/bin:$PATH" >> $ENVRC

maintenance: |
  julia --project=. -e 'using Pkg; Pkg.instantiate()'

knowledge:
  - name: lint
    contents: |
      julia -e 'using Pkg; Pkg.activate(temp=true); Pkg.add("JuliaFormatter"); using JuliaFormatter; format(".", overwrite=false) || exit(1)'
  - name: test
    contents: |
      julia --project=. -e 'using Pkg; Pkg.test()'
  - name: build-docs
    contents: |
      DOCUMENTER_TEST=true julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate(); include("docs/make.jl")'
  - name: notes
    contents: |
      Project targets Julia 1.10. Use the bundled Julia binary under ~/.julia/julia-1.10.11/bin.
