name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Julia ${{ matrix.julia-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11', '1.12']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@4a4849c39573e602e4e95c462d9e5b40c23b457e # v2.0.2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@024d91e982d39b8be1c20dd7b9d8201d1a25a095 # v2.0.0
      - uses: julia-actions/julia-buildpkg@85e83c83a1b3e7e1e238e378e3c23b1b5160c4e0 # v1.4.0
      - uses: julia-actions/julia-runtest@3098e172f28e32898d55b6c9068f35a980c1c003 # v1.10.0

  format:
    name: JuliaFormatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@4a4849c39573e602e4e95c462d9e5b40c23b457e # v2.0.2
        with:
          version: '1.12'
      - uses: julia-actions/cache@024d91e982d39b8be1c20dd7b9d8201d1a25a095 # v2.0.0
      - run: julia --project=. -e 'using Pkg; Pkg.add("JuliaFormatter"); using JuliaFormatter; format(".", check=true)'
