name: Integration Tests (dYdX)

on:
  schedule:
    - cron: '23 6 * * *'   # daily at 06:23 UTC
  workflow_dispatch:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DYDX_INTEGRATION: "true"

jobs:
  dydx:
    name: dYdX v4 integration — Julia ${{ matrix.julia-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11', '1.12']

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Julia
        uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia artifacts
        uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9 # v2

      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'

      - name: Run dYdX integration tests
        run: julia --project=. -e 'include("test/integration/test_dydx.jl")'
